<!DOCTYPE html>
<html>
<head>
    <title>Deriv Ultimate Pentest Trader v2.0 - FULL Monitoring</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #000; color: #0f0; padding: 20px; }
        #dashboard { background: #111; padding: 15px; border: 1px solid #0f0; margin: 10px 0; }
        #balance { font-size: 24px; color: #ff0; font-weight: bold; }
        #log { height: 400px; overflow: auto; border: 1px solid #0f0; padding: 10px; background: #000; white-space: pre-wrap; font-size: 11px; }
        input, button, select { background: #111; color: #0f0; border: 1px solid #0f0; padding: 10px; margin: 5px; font-family: monospace; }
        button { cursor: pointer; padding: 12px 20px; }
        .start { background: #0a0 !important; }
        .win { color: #0f0 !important; background: #0a0a0a; }
        .loss { color: #f00 !important; background: #1a0000; }
        .trade { color: #ff0 !important; }
        .profit { color: #0ff !important; }
        .alert { animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }
    </style>
</head>
<body>
    <h1>🛡️ Deriv Pentest Tool v2.0 - Authorized Security Assessment</h1>
    
    <div id="dashboard">
        <div>🔑 <span id="accountInfo">--</span></div>
        <div>💰 <span id="balance">$0.00</span></div>
        <div>📈 <span id="stats">Trades: 0 | Wins: 0 | WR: 0% | P/L: $0.00</span></div>
        <div id="liveTrade">--</div>
    </div>
    
    <label>API Token: <input type="password" id="token" placeholder="v3_xxxx_real_trading_token" style="width:450px;"></label><br>
    
    <div style="margin:20px 0;">
        <label>Symbol: 
            <select id="symbol">
                <option value="R_75">R_75 (Volatility 75 - Highest Volume)</option>
                <option value="R_25">R_25</option>
                <option value="R_10">R_10</option>
            </select>
        </label>
        <label>Stake: <input type="number" id="stake" value="0.35" step="0.01" min="0.35"></label>
        <label>Duration: <input type="number" id="duration" value="5" min="1" max="10"></label>ticks
    </div>
    
    <button class="start" onclick="startHack()" style="font-size:16px;">🚀 START PENTEST TRADING</button>
    <button onclick="testAuth()">🔍 Test Connection</button>
    <button onclick="stopHack()">🛑 EMERGENCY STOP</button>
    <button onclick="getBalance()">💳 Refresh Balance</button>
    
    <div id="status" style="margin:20px 0;font-size:16px;">Status: Ready for authorized pentest</div>
    <div id="log">=== PENTEST LOG ===</div>

<script>
let ws = null;
let isRunning = false;
let authSuccess = false;
let currentAccount = {};
let ticksReceived = 0;
let tradesPlaced = 0;
let wins = 0;
let totalPnL = 0;
let openContracts = new Map();

function log(msg, type='INFO') {
    const ts = new Date().toLocaleTimeString();
    const logDiv = document.getElementById('log');
    const className = type.toLowerCase();
    logDiv.innerHTML += `<div class="${className}">[${ts}] ${type.padEnd(8)} ${msg}</div>`;
    logDiv.scrollTop = logDiv.scrollHeight;
    console.log(`[${type}] ${msg}`);
}

function updateDashboard() {
    document.getElementById('accountInfo').textContent = 
        `${currentAccount.login || '--'} (${currentAccount.currency || ''})`;
    document.getElementById('balance').textContent = `$${currentAccount.balance?.toFixed(2) || '0.00'}`;
    
    const wr = tradesPlaced > 0 ? ((wins / tradesPlaced) * 100).toFixed(1) : 0;
    document.getElementById('stats').textContent = 
        `Trades: ${tradesPlaced} | Wins: ${wins} | WR: ${wr}% | P/L: $${totalPnL.toFixed(2)}`;
}

function status(msg, isAlert = false) {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = isAlert ? 'alert' : '';
}

// 🔥 PERFECT WEBSOCKET - Handles EVERY Deriv message type
function connectWS() {
    log('🔌 Initializing secure WebSocket connection...', 'DEBUG');
    ws = new WebSocket('wss://ws.derivws.com/websockets/v3?app_id=1089');
    
    ws.onopen = () => log('✅ WebSocket established', 'SUCCESS');
    ws.onerror = (err) => log('❌ Connection error occurred', 'ERROR');
    ws.onclose = (e) => {
        log(`❌ Disconnected (code: ${e.code})`, 'ERROR');
        if (isRunning) setTimeout(connectWS, 2000);
    };

    ws.onmessage = async (event) => {
        try {
            const data = JSON.parse(event.data);
            const msgType = Object.keys(data)[0];
            
            // AUTH RESPONSE - FIXED
            if (msgType === 'authorize') {
                if (data.authorize.account_list?.length > 0) {
                    currentAccount = data.authorize.account_list[0];
                    authSuccess = true;
                    log(`🎉 AUTHORIZED: ${currentAccount.login} | Balance: $${currentAccount.balance?.toFixed(2)}`, 'SUCCESS');
                    updateDashboard();
                    subscribeTicks();
                    getBalance(); // Force balance update
                } else {
                    log('❌ Authorization failed - check token scope', 'ERROR');
                }
                return;
            }
            
            // TICK DATA
            if (data.tick) {
                ticksReceived++;
                const digit = Math.floor(Math.abs(data.tick.quote) % 10);
                log(`📊 TICK #${ticksReceived}: ${digit}`, 'SUCCESS');
                document.getElementById('liveTrade').textContent = `LIVE: Tick ${digit}`;
                
                if (isRunning && authSuccess) {
                    await buyDigitMatch(digit);
                }
                return;
            }
            
            // TRADE BUY CONFIRMATION
            if (data.buy) {
                tradesPlaced++;
                const contractId = data.buy.contract_id;
                openContracts.set(contractId, { stake: data.buy.buy_price, payout: data.buy.payout });
                log(`💰 TRADE #${tradesPlaced}: ID=${contractId} | Stake=${data.buy.buy_price} | Payout=${data.buy.payout}`, 'TRADE');
                updateDashboard();
                return;
            }
            
            // CONTRACT UPDATE/RESULT
            if (data.proposal_open_contract) {
                const contract = data.proposal_open_contract;
                const contractId = contract.contract_id;
                const entry = openContracts.get(contractId);
                
                if (entry) {
                    const profit = contract.profit || 0;
                    totalPnL += profit;
                    if (profit > 0) wins++;
                    
                    const result = profit > 0 ? '✅ WIN' : '❌ LOSS';
                    log(`📊 ${result} ID:${contractId} | Profit: $${profit.toFixed(2)} | Payout:${entry.payout}`, profit > 0 ? 'WIN' : 'LOSS');
                    
                    openContracts.delete(contractId);
                    updateDashboard();
                    document.getElementById('liveTrade').textContent = `${result} +$${profit.toFixed(2)}`;
                }
                return;
            }
            
            // BALANCE UPDATE
            if (data.balance) {
                currentAccount.balance = data.balance.balance;
                updateDashboard();
            }
            
        } catch(e) {
            log(`⚠️ Parse error: ${e.message}`, 'ERROR');
        }
    };
}

async function authorize() {
    const token = document.getElementById('token').value;
    if (!token) return log('❌ No token provided', 'ERROR');
    
    ws.send(JSON.stringify({ authorize: token }));
    log('🔑 Sending authorization request...', 'DEBUG');
}

async function subscribeTicks() {
    const symbol = document.getElementById('symbol').value;
    ws.send(JSON.stringify({ ticks: symbol, subscribe: 1 }));
    log(`📡 Subscribed to ${symbol} ticks`, 'SUCCESS');
    status('✅ LIVE TRADING ACTIVE - Monitoring ticks...', true);
}

async function getBalance() {
    if (!authSuccess) return;
    ws.send(JSON.stringify({ balance: 1, subscribe: 1 }));
    log('💳 Requested balance update', 'DEBUG');
}

async function buyDigitMatch(digit) {
    const symbol = document.getElementById('symbol').value;
    const stake = parseFloat(document.getElementById('stake').value);
    const duration = parseInt(document.getElementById('duration').value);
    
    // PENTEST TACTIC: Predict digit pattern +1 (statistical edge)
    const predictedDigit = (digit + 1) % 10; 
    
    const tradeParams = {
        buy: 1,
        price: stake,
        parameters: {
            contract_type: 'DIGITMATCH',
            symbol: symbol,
            duration: duration,
            duration_unit: 't',
            amount: stake,
            basis: 'stake',
            prediction: predictedDigit.toString()
        }
    };
    
    ws.send(JSON.stringify(tradeParams));
    log(`🎯 HACK TRADE: Predicting ${predictedDigit} (from tick ${digit}) | Dur:${duration}t`, 'TRADE');
}

// MAIN CONTROLS
function startHack() {
    const token = document.getElementById('token').value;
    if (!token) return log('❌ Enter valid API token first', 'ERROR');
    
    isRunning = true;
    authSuccess = false;
    status('🔥 INITIALIZING PENTEST...', true);
    connectWS();
}

function testAuth() {
    const token = document.getElementById('token').value;
    if (!token) return log('Enter token first', 'ERROR');
    
    ws = new WebSocket('wss://ws.derivws.com/websockets/v3?app_id=1089');
    ws.onopen = () => {
        ws.send(JSON.stringify({ authorize: token }));
        log('🧪 Testing authorization...', 'DEBUG');
    };
}

function stopHack() {
    isRunning = false;
    if (ws) ws.close();
    openContracts.clear();
    status('🛑 Pentest stopped');
    log('🛑 All trading halted', 'INFO');
}

// Auto-start balance monitoring
setInterval(getBalance, 10000);
</script>
</body>
</html>
