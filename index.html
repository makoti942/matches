<!DOCTYPE html>
<html>
<head>
    <title>Deriv Debug Trader - Fixed WS + Auth</title>
    <style> body { font-family: monospace; background: #000; color: #0f0; padding: 20px; } #log { height: 500px; overflow: auto; border: 1px solid #0f0; padding: 10px; margin: 10px 0; background: #111; } input, button { background: #111; color: #0f0; border: 1px solid #0f0; padding: 8px; margin: 5px; } </style>
</head>
<body>
    <h1>🔧 DEBUG: Deriv WS Trader (Fixed Auth + Ticks)</h1>
    <label>API Token: <input type="password" id="token" placeholder="v3_xxxx_your_token"></label><br>
    <label>Symbol: <select id="symbol"><option value="R_75">Vol 75</option><option value="R_10">Vol 10</option></select></label>
    <label>Stake: <input type="number" id="stake" value="0.35" step="0.01"></label>
    <button onclick="startHack()">▶️ START FULL DEBUG</button> <button onclick="testAuth()">🧪 Test Auth Only</button>
    <div id="status">Status: Click START</div>
    <div id="log"></div>

<script>
let ws = null;
let isRunning = false;
let authSuccess = false;
let ticksReceived = 0;

function log(msg, type='INFO') {
    const ts = new Date().toLocaleTimeString();
    const logDiv = document.getElementById('log');
    logDiv.innerHTML += `<div>[${ts}] <span style="color:${type=='ERROR'?'#f00':type=='SUCCESS'?'#0f0':'#0ff'}">[${type}]</span> ${msg}</div>`;
    logDiv.scrollTop = logDiv.scrollHeight;
    console.log(`[${type}] ${msg}`);
}

function status(msg) {
    document.getElementById('status').textContent = `Status: ${msg}`;
}

// FIXED: Proper WS connection + ALL callbacks
function connectWS() {
    log('Connecting to wss://ws.derivws.com/websockets/v3?app_id=1089', 'DEBUG');
    ws = new WebSocket('wss://ws.derivws.com/websockets/v3?app_id=1089');
    
    ws.onopen = () => {
        log('✅ WebSocket OPENED - Sending auth', 'SUCCESS');
        authorize(); // Auto-auth on connect
    };
    
    ws.onerror = (err) => log('❌ WebSocket ERROR: ' + err, 'ERROR');
    
    ws.onclose = (event) => {
        log(`❌ WS CLOSED: code=${event.code} reason=${event.reason}`, 'ERROR');
        if (isRunning) setTimeout(connectWS, 2000); // Auto-reconnect
    };
    
    // CRITICAL: This was missing/broken
    ws.onmessage = (event) => {
        try {
            const data = JSON.parse(event.data);
            log(`📥 RAW WS: ${JSON.stringify(data).substring(0,200)}...`, 'DEBUG');
            
            // AUTH SUCCESS CHECK
            if (data.authorize) {
                if (data.authorize.authorized) {
                    authSuccess = true;
                    log('🎉 AUTH SUCCESS - Token valid! Subscribing to ticks...', 'SUCCESS');
                    subscribeTicks();
                } else {
                    log('❌ AUTH FAILED: Invalid/expired token', 'ERROR');
                }
            }
            
            // TICK DATA ARRIVED!
            if (data.tick) {
                ticksReceived++;
                const digit = Math.floor(Math.abs(data.tick.quote) % 10);
                log(`🎯 TICK #${ticksReceived}: Quote=${data.tick.quote} → DIGIT=${digit}`, 'SUCCESS');
                
                if (isRunning && authSuccess) {
                    buyDigitMatch(digit);
                }
            }
            
            // TRADE RESULT
            if (data.buy) {
                log(`💰 TRADE PLACED: ID=${data.buy.contract_id} Payout=${data.buy.payout}`, 'SUCCESS');
            }
            if (data.proposal_open_contract) {
                const profit = data.proposal_open_contract.profit;
                log(`📊 CONTRACT RESULT: Profit=${profit} (${profit > 0 ? 'WIN' : 'LOSS'})`, profit > 0 ? 'SUCCESS' : 'ERROR');
            }
            
        } catch(e) {
            log('JSON parse error: ' + e, 'ERROR');
        }
    };
}

// AUTHENTICATE
function authorize() {
    const token = document.getElementById('token').value;
    if (!token) return log('No token provided', 'ERROR');
    
    ws.send(JSON.stringify({ authorize: token }));
    log(`🔑 Sent auth for token: ${token.substring(0,10)}...`, 'DEBUG');
}

// SUBSCRIBE TO TICKS
function subscribeTicks() {
    const symbol = document.getElementById('symbol').value;
    ws.send(JSON.stringify({
        ticks: symbol,
        subscribe: 1
    }));
    log(`📡 Subscribed to ${symbol} ticks`, 'SUCCESS');
}

// PLACE DIGIT MATCH TRADE (PREDICT NEXT DIGIT)
function buyDigitMatch(predictedDigit) {
    const symbol = document.getElementById('symbol').value;
    const stake = parseFloat(document.getElementById('stake').value);
    
    const trade = {
        buy: 1,
        price: stake,
        parameters: {
            contract_type: 'DIGITMATCH',
            symbol: symbol,
            duration: 5,
            duration_unit: 't',
            amount: stake,
            basis: 'stake',
            prediction: predictedDigit.toString()
        }
    };
    
    log(`🚀 BUYING DIGITMATCH ${predictedDigit} | Stake $${stake}`, 'SUCCESS');
    ws.send(JSON.stringify(trade));
}

// START BUTTON
function startHack() {
    const token = document.getElementById('token').value;
    if (!token) return log('❌ Enter API token first!', 'ERROR');
    
    isRunning = true;
    authSuccess = false;
    ticksReceived = 0;
    status('🔥 CONNECTING WS → AUTH → TICKS → TRADING...');
    connectWS();
}

// TEST AUTH ONLY
function testAuth() {
    const token = document.getElementById('token').value;
    if (!token) return log('Enter token first', 'ERROR');
    ws = new WebSocket('wss://ws.derivws.com/websockets/v3?app_id=1089');
    ws.onopen = () => ws.send(JSON.stringify({ authorize: token }));
    ws.onmessage = (e) => {
        const data = JSON.parse(e.data);
        log('AUTH TEST: ' + JSON.stringify(data));
        if (data.error) log('❌ ' + data.error.message, 'ERROR');
    };
}
</script>
</body>
</html>
